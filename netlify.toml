# Netlify configuration for Next.js 14 (deepacode)
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Essential Next.js plugin: handles SSR, API routes, and image optimization
[[plugins]]
  package = "@netlify/plugin-nextjs"
